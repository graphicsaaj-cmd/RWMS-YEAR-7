<!DOCTYPE html>
<html>
<head>
<title>ROYAL WUNDERKIND MODEL SCHOOL CBT</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    /* LOGIN OVERLAY */
    #loginOverlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #0a2a66;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }
    .login-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .login-box input {
        padding: 10px;
        width: 80%;
        margin: 15px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    .header-main {
        background: white;
        padding: 10px;
        border-bottom: 2px solid #0a2a66;
    }

    /* STICKY STUDENT BAR */
    .student-bar {
        position: sticky;
        top: 0;
        background: #ffffff;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 1000;
        border-bottom: 2px solid #0a2a66;
    }

    .container {
        max-width: 900px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 { text-align: center; color: #0a2a66; margin: 5px 0; }

    .timer {
        font-size: 20px;
        font-weight: bold;
        color: red;
        background: #fff0f0;
        padding: 5px 15px;
        border-radius: 5px;
        border: 1px solid red;
    }

    .question { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #ddd; }
    .options label { display: block; margin: 8px 0; cursor: pointer; }
    
    button {
        padding: 15px 30px;
        background: #0a2a66;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
        width: 100%;
    }

    button:hover { background: #1f4fd1; }
    .result { font-size: 24px; font-weight: bold; text-align: center; margin-top: 20px; color: #0a2a66; }
    .correct { color: green; font-weight: bold; margin-top: 10px; background: #e8f5e9; padding: 5px; }
</style>

</head>

<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>RoyaL Wunderkind Model School</h2>
         <h3>Subject: Intermediate Science | Year 7</h3>
        <p>Enter your Full Name to start the exam:</p>
        <input type="text" id="studentNameInput" placeholder="e.g. John Doe">
        <br>
        <button type="button" onclick="startExam()">Start Examination</button>
    </div>
</div>

<div class="header-main">
    <h1>ROYAL WUNDERKIND MODEL SCHOOL</h1>
    <h3 style="text-align:center; color:#555;">Intermediate Science CBT – YEAR 7</h3>
</div>

<div class="student-bar">
    <div><strong>Student:</strong> <span id="displayName">---</span></div>
    <div class="timer">Time: <span id="time">45:00</span></div>
</div>

<div class="container">
    <form id="quizForm">
        <div id="questions"></div>
        <button type="button" id="submitBtn" onclick="submitExam()" style="display:none;">Submit Exam</button>
    </form>
    <div class="result" id="result"></div>
</div>

<script>
// (All 60 questions from your original code remain here)
const questions = [
{q:"Science is the systematic study of the ______ world.", options:["Artificial","Natural","Imaginary","Spiritual"],answer:1},
{q:"Science explains natural events using observation, experimentation and ______.", options:["Guessing","Logical reasoning","Dreaming","Imagination"],answer:1},
{q:"Which is a characteristic of science?", options:["Superstition","Evidence based","Emotion","Magic"],answer:1},
{q:"Which is an example of science in daily life?", options:["Charging a phone","Sleeping","Dancing","Talking"],answer:0},
{q:"The study of living organisms is called ______.", options:["Physics","Chemistry","Biology","Geography"],answer:2},
{q:"The study of plants is called ______.", options:["Zoology","Botany","Ecology","Anatomy"],answer:1},
{q:"The study of animals is called ______.", options:["Botany","Zoology","Ecology","Physiology"],answer:1},
{q:"The study of substances and their reactions is ______.", options:["Biology","Chemistry","Physics","Ecology"],answer:1},
{q:"The study of matter and energy is called ______.", options:["Physics","Biology","Botany","Sociology"],answer:0},
{q:"The study of weather is called ______.", options:["Meteorology","Geology","Oceanography","Astronomy"],answer:0},
{q:"The first step in scientific method is ______.", options:["Observation","Experiment","Conclusion","Analysis"],answer:0},
{q:"A smart guess in science is called ______.", options:["Observation","Hypothesis","Experiment","Theory"],answer:1},
{q:"Testing a hypothesis is called ______.", options:["Observation","Experiment","Communication","Analysis"],answer:1},
{q:"Recording results is called ______.", options:["Data collection","Hypothesis","Observation","Prediction"],answer:0},
{q:"Matter is anything that has ______ and occupies space.", options:["Mass","Colour","Taste","Smell"],answer:0},
{q:"The three states of matter are ______.", options:["Solid liquid gas","Water air fire","Stone gas dust","Air soil fire"],answer:0},
{q:"Which of these is a solid?", options:["Water","Oil","Book","Milk"],answer:2},
{q:"Liquids have ______.", options:["Fixed shape and volume","No shape but fixed volume","No shape no volume","Fixed shape only"],answer:1},
{q:"Gases have ______.", options:["Fixed shape","Fixed volume","No shape and no volume","Fixed size"],answer:2},
{q:"Smallest building block of matter is ______.", options:["Atom","Molecule","Ion","Cell"],answer:0},
{q:"Two atoms joined together form a ______.", options:["Cell","Molecule","Organ","Tissue"],answer:1},
{q:"Charged atoms are called ______.", options:["Atoms","Molecules","Ions","Cells"],answer:2},
{q:"Which is a living thing?", options:["Stone","Goat","Chair","Pen"],answer:1},
{q:"Which is non-living?", options:["Dog","Maize","Water","Goat"],answer:2},
{q:"Production of young ones is ______.", options:["Growth","Respiration","Reproduction","Movement"],answer:2},
{q:"Removal of body waste is ______.", options:["Respiration","Excretion","Growth","Feeding"],answer:1},
{q:"Plants make food through ______.", options:["Respiration","Photosynthesis","Digestion","Absorption"],answer:1},
{q:"Which animal gives birth to live young?", options:["Hen","Lizard","Cow","Snake"],answer:2},
{q:"Which animal lays eggs?", options:["Goat","Chicken","Dog","Sheep"],answer:1},
{q:"Which plant part makes food?", options:["Root","Stem","Leaf","Flower"],answer:2},
{q:"Shiny surface of metals is called ______.", options:["Lustre","Ductility","Brittleness","Malleability"],answer:0},
{q:"Metals conduct ______.", options:["Heat and electricity","Air and water","Light and wind","Water and gas"],answer:0},
{q:"Which is a metal?", options:["Sulphur","Carbon","Iron","Oxygen"],answer:2},
{q:"Which is a non-metal?", options:["Iron","Copper","Carbon","Zinc"],answer:2},
{q:"Energy is the ability to ______.", options:["Rest","Do work","Sleep","Move"],answer:1},
{q:"Heat energy produces ______.", options:["Light","Warmth","Sound","Wind"],answer:1},
{q:"Light energy helps us ______.", options:["Hear","See","Taste","Touch"],answer:1},
{q:"Energy stored in food is ______ energy.", options:["Chemical","Heat","Light","Sound"],answer:0},
{q:"Energy from the sun is ______.", options:["Wind energy","Solar energy","Heat energy","Chemical energy"],answer:1},
{q:"Energy from vibration is ______.", options:["Sound energy","Heat energy","Light energy","Chemical energy"],answer:0},
{q:"Energy changing from one form to another is ______.", options:["Energy movement","Energy transformation","Energy storage","Energy division"],answer:1},
{q:"Generator converts ______ energy to electricity.", options:["Mechanical","Heat","Sound","Solar"],answer:0},
{q:"Electric bulb converts electricity to ______.", options:["Heat","Sound","Light","Chemical"],answer:2},
{q:"Solar panels convert solar energy to ______.", options:["Heat","Electrical","Sound","Mechanical"],answer:1},
{q:"Renewable energy sources can be ______ naturally.", options:["Destroyed","Replaced","Hidden","Reduced"],answer:1},
{q:"Which is renewable energy?", options:["Coal","Petrol","Solar","Diesel"],answer:2},
{q:"Which is non-renewable?", options:["Wind","Sun","Petroleum","Water"],answer:2},
{q:"Wind energy comes from ______.", options:["Sunlight","Moving air","Water","Soil"],answer:1},
{q:"Hydroelectric energy comes from ______.", options:["Flowing water","Sun","Coal","Petrol"],answer:0},
{q:"Too much firewood causes ______.", options:["Flooding","Deforestation","Rain","Wind"],answer:1},
{q:"Petrol and diesel are ______ energy.", options:["Renewable","Non-renewable","Solar","Wind"],answer:1},
{q:"Hospital machines like X-ray use ______.", options:["Energy","Soil","Water","Wind"],answer:0},
{q:"Energy from plants and waste is ______.", options:["Solar","Biomass","Wind","Coal"],answer:1},
{q:"Vehicles use ______.", options:["Petrol","Sunlight","Wind","Water"],answer:0},
{q:"Energy helps in ______.", options:["Cooking","Sleeping","Dreaming","Resting"],answer:0},
{q:"Renewable energy reduces ______.", options:["Pollution","Sunlight","Wind","Rain"],answer:0},
{q:"Proper energy use ensures ______ development.", options:["Temporary","Sustainable","Weak","Slow"],answer:1},
{q:"One importance of energy is that it helps in ______.", options:["cooking food","sleeping","dreaming","resting"],answer:0},
{q:"Renewable energy helps reduce ______.", options:["pollution","rainfall","sunshine","wind"],answer:0},
{q:"Proper use of energy ensures ______ development.", options:["temporary","sustainable","weak","poor"],answer:1}
];

let time = 2700;
let timerInterval;

function startExam() {
    const name = document.getElementById("studentNameInput").value;
    if (name.trim() === "") {
        alert("Please enter your name!");
        return;
    }
    document.getElementById("displayName").textContent = name;
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("submitBtn").style.display = "block";
    renderQuestions();
    startTimer();
}

function renderQuestions() {
    const container = document.getElementById("questions");
    questions.forEach((q, index) => {
        let html = `<div class="question">
            <p><b>${index+1}. ${q.q}</b></p>
            <div class="options">`;
        q.options.forEach((opt, i) => {
            html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
        });
        html += `</div></div>`;
        container.innerHTML += html;
    });
}

function startTimer() {
    timerInterval = setInterval(function() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        document.getElementById("time").innerHTML = minutes + ":" + (seconds < 10 ? "0" + seconds : seconds);
        time--;
        if (time < 0) {
            clearInterval(timerInterval);
            submitExam();
            alert("Time Up! Exam Submitted");
        }
    }, 1000);
}

function submitExam() {
    clearInterval(timerInterval);
    let score = 0;
    questions.forEach((q, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        let div = document.querySelectorAll(".question")[i];
        
        if (selected && parseInt(selected.value) === q.answer) {
            score++;
        }
        
        let correctText = q.options[q.answer];
        div.innerHTML += `<div class="correct">Correct Answer: ${correctText}</div>`;
    });

    document.getElementById("result").innerHTML = `Examination Complete!<br>Final Score: ${score} / ${questions.length}`;
    document.getElementById("submitBtn").style.display = "none";
    window.scrollTo(0,0);
}
</script>

</body>
</html>
