<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Year 7 English Language - Grammar CBT</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.5;
      background-color: #f9f9f9;
    }
    h1, h2 {
      text-align: center;
      color: #2c3e50;
    }
    .timer {
      text-align: center;
      font-size: 1.6em;
      font-weight: bold;
      color: #e74c3c;
      margin: 20px 0;
      padding: 12px;
      border: 2px solid #e74c3c;
      border-radius: 8px;
      display: inline-block;
      width: 220px;
    }
    .info {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 30px;
    }
    .question {
      margin-bottom: 28px;
      padding: 18px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .question h3 {
      margin-top: 0;
      color: #34495e;
    }
    label {
      display: block;
      margin: 10px 0;
      cursor: pointer;
    }
    input[type="radio"] {
      margin-right: 10px;
    }
    button {
      display: block;
      margin: 40px auto;
      padding: 14px 40px;
      font-size: 1.2em;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #219653;
    }
    .correct {
      color: #27ae60;
      font-weight: bold;
    }
    .result {
      text-align: center;
      font-size: 1.4em;
      margin: 30px 0;
      padding: 20px;
      background: #ecf0f1;
      border-radius: 8px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<h1>English Language – Year 7</h1>
<h2>SECTION B: GRAMMAR – OBJECTIVE QUESTIONS</h2>

<div class="info">
  Choose the correct answer (A – D) for each question.<br>
  Time allowed: 45 minutes
</div>

<div class="timer" id="timer">45:00</div>

<form id="quizForm">

  <!-- Questions will be inserted here by JavaScript -->

</form>

<button id="submitBtn">Submit Test</button>

<div id="result" class="result hidden"></div>

<script>
// ────────────────────────────────────────────────
// DATA - QUESTIONS & CORRECT ANSWERS
// ────────────────────────────────────────────────
const questions = [
  { q: "Which of the following words is a verb?", opts: ["quickly", "teacher", "write", "beauty"], ans: "C" },
  { q: "The past tense of begin is", opts: ["begun", "began", "beginning", "begins"], ans: "B" },
  { q: "The past participle of break is", opts: ["broke", "breaking", "broken", "breaks"], ans: "C" },
  { q: "She ______ the letter before leaving the office.", opts: ["write", "wrote", "written", "writes"], ans: "B" },
  { q: "The children ______ happily in the playground yesterday.", opts: ["play", "plays", "played", "playing"], ans: "C" },
  { q: "Identify the verb in the sentence: The teacher explained the lesson carefully.", opts: ["teacher", "lesson", "explained", "carefully"], ans: "C" },
  { q: "The correct past tense of teach is", opts: ["teached", "taught", "teaching", "teach"], ans: "B" },
  { q: "Identify the adjective in the sentence: The intelligent girl solved the problem quickly.", opts: ["girl", "intelligent", "solved", "quickly"], ans: "B" },
  { q: "Which of the following is an adjective?", opts: ["kindness", "quickly", "brave", "happily"], ans: "C" },
  { q: "This building is ______ than the one beside it.", opts: ["tall", "taller", "tallest", "more tall"], ans: "B" },
  { q: "Choose the correct adjective: The ______ boy won the competition.", opts: ["courage", "courageous", "courageously", "courageing"], ans: "B" },
  { q: "Identify the adjective in the sentence: She bought a beautiful dress for the party.", opts: ["bought", "dress", "beautiful", "party"], ans: "C" },
  { q: "Which of the following is an adverb?", opts: ["quickly", "quick", "quicker", "quickness"], ans: "A" },
  { q: "He completed the assignment ______.", opts: ["careful", "carefully", "care", "caring"], ans: "B" },
  { q: "Identify the adverb in the sentence: The boy ran swiftly to catch the bus.", opts: ["boy", "ran", "swiftly", "bus"], ans: "C" },
  { q: "An adverb can modify a", opts: ["noun only", "verb only", "verb, adjective or another adverb", "pronoun only"], ans: "C" },
  { q: "They arrived ______ at the meeting.", opts: ["early", "earlier", "earliest", "earlying"], ans: "A" },
  { q: "The keys are ______ the drawer.", opts: ["in", "at", "on", "between"], ans: "A" },
  { q: "The students walked ______ the bridge.", opts: ["across", "among", "beside", "under"], ans: "A" },
  { q: "The picture is hanging ______ the wall.", opts: ["at", "on", "beside", "under"], ans: "B" },
  { q: "Identify the preposition in the sentence: The dog ran into the house.", opts: ["dog", "ran", "into", "house"], ans: "C" },
  { q: "Mary studied hard ______ she passed the examination.", opts: ["but", "because", "so", "although"], ans: "C" },
  { q: "I will attend the meeting ______ I am invited.", opts: ["if", "but", "and", "because"], ans: "A" },
  { q: "She was tired ______ she continued working.", opts: ["because", "but", "so", "and"], ans: "B" },
  { q: "Which of the following words is a conjunction?", opts: ["under", "quickly", "because", "tall"], ans: "C" },
  { q: "Which sentence is correctly capitalized?", opts: ["lagos is the commercial capital of nigeria.", "Lagos is the commercial capital of Nigeria.", "lagos is the commercial Capital of nigeria.", "Lagos is the Commercial capital of nigeria."], ans: "B" },
  { q: "Which word should begin with a capital letter?", opts: ["teacher", "january", "classroom", "student"], ans: "B" },
  { q: "Choose the correctly written sentence.", opts: ["My brother lives in abuja.", "My brother lives in Abuja.", "my brother lives in Abuja.", "My Brother lives in abuja."], ans: "B" },
  { q: "Which sentence is correctly capitalized?", opts: ["We celebrate Christmas in december.", "We celebrate christmas in December.", "We celebrate Christmas in December.", "we celebrate Christmas in December."], ans: "C" },
  { q: "Which of the following is correct?", opts: ["Mr john teaches English.", "Mr John teaches English.", "mr John teaches english.", "Mr john teaches english."], ans: "B" },
  { q: "A verb is a word that shows", opts: ["action", "colour", "size", "number"], ans: "A" },
  { q: "Which of the following is a verb?", opts: ["Jump", "Beautiful", "Quickly", "Tall"], ans: "A" },
  { q: "Identify the verb in this sentence: The boy runs fast.", opts: ["Boy", "Runs", "Fast", "The"], ans: "B" },
  { q: "Which word is an adjective?", opts: ["Tall", "Run", "Slowly", "Under"], ans: "A" },
  { q: "Adjectives describe", opts: ["verbs", "nouns", "conjunctions", "pronouns"], ans: "B" },
  { q: "Which word is an adverb?", opts: ["Quickly", "Beautiful", "Table", "Under"], ans: "A" },
  { q: "Adverbs usually describe", opts: ["nouns", "verbs", "pronouns", "conjunctions"], ans: "B" },
  { q: "In the sentence She sang beautifully, the word beautifully is an", opts: ["adjective", "adverb", "noun", "verb"], ans: "B" },
  { q: "Which of the following is a preposition?", opts: ["Under", "Quickly", "Happy", "Sing"], ans: "A" },
  { q: "Prepositions show", opts: ["action", "relationship between words", "colour", "size"], ans: "B" },
  { q: "Choose the correct preposition: The book is ___ the table.", opts: ["on", "quickly", "very", "but"], ans: "A" },
  { q: "A conjunction is used to", opts: ["join words or sentences", "describe nouns", "show action", "show place"], ans: "A" },
  { q: "Which of the following is a conjunction?", opts: ["And", "Quickly", "Tall", "Run"], ans: "A" },
  { q: "Choose the correct conjunction: John is tired ___ he continued working.", opts: ["but", "under", "quickly", "tall"], ans: "A" },
  { q: "Which of the following sentences is correctly capitalized?", opts: ["lagos is a big city in nigeria.", "Lagos is a big city in Nigeria.", "Lagos is a big city in nigeria.", "lagos is a big city in Nigeria."], ans: "B" },
  { q: "The first letter of a sentence should be written in", opts: ["small letter", "capital letter", "number", "symbol"], ans: "B" },
  { q: "Which of the following is the past tense of go?", opts: ["Went", "Going", "Goes", "Gone"], ans: "A" },
  { q: "Which word is the past tense of eat?", opts: ["Ate", "Eat", "Eating", "Eaten"], ans: "A" },
  { q: "In the sentence She walked slowly, the word slowly tells us", opts: ["where", "when", "how", "who"], ans: "C" },
  { q: "Which of the following sentences contains an adjective?", opts: ["The tall boy ran fast.", "She sings loudly.", "They played yesterday.", "He arrived early."], ans: "A" },
  { q: "Choose the correct verb form to complete the sentence. She ______ to school every day.", opts: ["go", "goes", "going", "gone"], ans: "B" },
  { q: "Identify the adjective in the sentence: The tall boy won the race.", opts: ["boy", "tall", "race", "won"], ans: "B" },
  { q: "Which of these is an adverb?", opts: ["Quickly", "Quick", "Quicker", "Quickest"], ans: "A" },
  { q: "Choose the correct preposition. The cat is hiding ______ the table.", opts: ["in", "under", "by", "with"], ans: "B" },
  { q: "Select the correct conjunction to complete the sentence. I wanted to go out, ______ it started raining.", opts: ["but", "and", "because", "so"], ans: "A" },
  { q: "Which sentence is correctly capitalized?", opts: ["my brother lives in lagos.", "My brother lives in lagos.", "My brother lives in Lagos.", "my brother lives in Lagos."], ans: "C" },
  { q: "Identify the adverb in the sentence. She sang beautifully at the concert.", opts: ["sang", "beautifully", "concert", "she"], ans: "B" },
  { q: "Choose the correct form of the verb. They have ______ their homework.", opts: ["finish", "finishing", "finished", "finishes"], ans: "C" },
  { q: "Which word is a conjunction?", opts: ["slowly", "and", "happy", "under"], ans: "B" },
  { q: "Identify the preposition in the sentence. The book is on the table.", opts: ["book", "is", "on", "table"], ans: "C" }
];

const letters = ["A", "B", "C", "D"];

// ────────────────────────────────────────────────
// BUILD QUIZ
// ────────────────────────────────────────────────
const form = document.getElementById("quizForm");

questions.forEach((qItem, index) => {
  const div = document.createElement("div");
  div.className = "question";
  div.innerHTML = `
    <h3>${index + 1}. ${qItem.q}</h3>
    ${qItem.opts.map((opt, i) => `
      <label>
        <input type="radio" name="q${index}" value="${letters[i]}" required>
        ${letters[i]}. ${opt}
        <span class="correct hidden" data-correct="${letters[i] === qItem.ans ? 'yes' : 'no'}"></span>
      </label>
    `).join("")}
  `;
  form.appendChild(div);
});

// ────────────────────────────────────────────────
// TIMER (45 minutes = 2700 seconds)
// ────────────────────────────────────────────────
let timeLeft = 45 * 60;
const timerDisplay = document.getElementById("timer");

function updateTimer() {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  timerDisplay.textContent = `${min}:${sec < 10 ? "0" : ""}${sec}`;
  
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    alert("Time is up! Your test will be submitted automatically.");
    submitQuiz();
  }
  timeLeft--;
}

const timerInterval = setInterval(updateTimer, 1000);
updateTimer(); // initial display

// ────────────────────────────────────────────────
// SUBMIT & SHOW ANSWERS
// ────────────────────────────────────────────────
const submitBtn = document.getElementById("submitBtn");
const resultDiv = document.getElementById("result");

function submitQuiz() {
  clearInterval(timerInterval);
  submitBtn.disabled = true;
  submitBtn.textContent = "Test Submitted";

  let score = 0;
  document.querySelectorAll(".question").forEach((qDiv, i) => {
    const selected = qDiv.querySelector(`input[name="q${i}"]:checked`);
    const correctSpans = qDiv.querySelectorAll(".correct");

    correctSpans.forEach(span => {
      span.classList.remove("hidden");
      if (span.dataset.correct === "yes") {
        span.textContent = " (correct answer)";
      }
    });

    if (selected && selected.value === questions[i].ans) {
      score++;
      selected.parentElement.style.color = "#27ae60";
      selected.parentElement.style.fontWeight = "bold";
    } else if (selected) {
      selected.parentElement.style.color = "#c0392b";
    }
  });

  resultDiv.innerHTML = `
    <strong>Test Completed!</strong><br>
    Your Score: <b>${score} / ${questions.length}</b><br>
    (${Math.round(score / questions.length * 100)}%)
  `;
  resultDiv.classList.remove("hidden");
  window.scrollTo(0, document.body.scrollHeight);
}

submitBtn.addEventListener("click", () => {
  if (confirm("Are you sure you want to submit? You cannot change answers after submission.")) {
    submitQuiz();
  }
});
</script>

</body>
</html>
