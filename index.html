<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Term 2 Examination 2025/2026 Academic session |  Subject:Digital Art </title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
            background: #f8f9fa;
            color: #333;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        #intro, #quiz, #result { max-width: 960px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
        #timer {
            font-size: 1.6em; font-weight: bold; color: #e74c3c; text-align: center; margin: 20px 0;
        }
        .question {
            margin: 30px 0; padding: 18px; border-left: 5px solid #3498db; background: #f9fcff; border-radius: 8px;
        }
        .options label {
            display: block; margin: 12px 0; cursor: pointer; line-height: 1.5;
        }
        button {
            display: block; margin: 35px auto; padding: 14px 50px; font-size: 1.25em;
            background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        button:hover { background: #219653; }
        #result table {
            width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.98em;
        }
        #result th, #result td {
            border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: top;
        }
        #result th { background: #34495e; color: white; }
        .correct { background: #e8f5e9; }
        .wrong { background: #ffebee; }
        #nameInput { padding: 12px; font-size: 1.1em; width: 340px; margin: 15px; }
        .hidden { display: none; }
        .answer-display { white-space: pre-wrap; }
    </style>
</head>
<body>
<div id="intro">
    <h1>Term 2 Examination 2025/2026 Academic session</h1>
    <h2>Digital Art | Fundamental Genres of Literature & Book Creation</h2>
    <p style="text-align:center; font-size:1.3em;">60 Objective Questions • 45 Minutes</p>
    <div style="text-align:center;">
        <label>Enter your full name: </label><br>
        <input type="text" id="nameInput" placeholder="Your Name..." required />
        <button onclick="startExam()">Start Examination</button>
    </div>
</div>
<div id="quiz" class="hidden">
    <h2 id="candidateName"></h2>
    <div id="timer">Time remaining: 45:00</div>
  
    <form id="quizForm"></form>
  
    <button type="button" onclick="submitExam()">Submit Exam</button>
</div>
<div id="result" class="hidden">
    <h2>Examination Result</h2>
    <div id="summary"></div>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Question</th>
                <th>Your Answer</th>
                <th>Correct Answer</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>
<script>
// Correct answers (index 0 = question 1)
const correctAnswers = [
    "B","C","C","B","C","B","B","C","B","B", // 1-10
    "C","B","B","C","D","C","B","A","B","C", // 11-20
    "B","C","B","C","B","C","B","C","B","C", // 21-30
    "C","C","C","C","A","C","B","B","C","B", // 31-40
    "C","A","B","B","B","B","C","B","C","C", // 41-50
    "B","B","C","C","B","B","B","C","C","B" // 51-60
];
const questions = [
    "1. Stories created from the author’s imagination are called ______. ",
    "2. A book that tells real-life events is called ______. ",
    "3. An autobiography is a story about ______. ",

    "11. The first step in book writing is ______. ",
    "12. Finding your “Why” helps you stay ______. ",
    "13. Developing your idea includes deciding the ______. ",
    "14. An outline helps to ______ your book. ",
    "15. Research is important for both fiction and ______. ",
    "16. The first draft should focus on ______. ",
    "17. Revision focuses on ______. ",
    "18. Editing improves ______. ",

    "35. Full justification is mainly used for ______. ",

    "37. eBook fonts should remain ______. ",
    "38. The first page of a book is the ______. ",
    "39. The title page usually appears on the ______ side. ",
    "40. The copyright page is placed after the ______ page. ",
    "41. The copyright symbol is written as ______. ",
    "42. ISBN stands for ______. ",
    "43. A dedication page is ______. ",
    "44. The Table of Contents lists ______. ",
    "45. Front matter uses ______ numerals. ",
    "46. Chapter 1 begins with ______ numerals. ",
    "47. Track Changes is a feature in ______. ",
    "48. Track Changes shows ______. ",
    "49. Proofreading is the ______ step before publishing. ",
    "50. Proofreading checks sentence ______. ",
    "51. Consistency of tense and tone is checked during ______. ",
    "52. A full book cover set includes ______ elements. ",
    "53. The front cover must contain the ______. ",
    "54. The author’s name appears on the ______. ",
    "55. Illustrations on the cover make it more ______. ",
    "56. The subtitle on a cover is ______. ",
    "57. Professional formatting improves ______. ",
    "58. Research ensures information is ______. ",
    "59. Revision focuses on ______ organization. ",
    "60. Editing removes ______ words. "
];
const options = [
    ["A. Non-fiction","B. Fiction","C. Biography","D. Essay"],
    ["A. Fantasy","B. Horror","C. Non-fiction","D. Drama"],
    ["A. animals","B. another person","C. the author’s life","D. imagination"],
    ["A. the writer","B. another person","C. a character","D. a place"],
    ["A. read silently","B. memorized","C. performed","D. drawn"],
    ["A. narration only","B. dialogue and action","C. pictures","D. songs"],
    ["A. mathematical","B. rhythmic and aesthetic","C. scientific","D. technical"],
    ["A. drama","B. fiction","C. poetry","D. essay"],
    ["A. poetry","B. fiction","C. drama","D. non-fiction"],
    ["A. social fiction","B. science fiction","C. silent fiction","D. simple fiction"],
    ["A. publishing","B. printing","C. planning","D. advertising"],
    ["A. confused","B. driven","C. tired","D. bored"],
    ["A. printer","B. genre","C. paper colour","D. price"],
    ["A. destroy","B. decorate","C. structure","D. shorten"],
    ["A. drama","B. poetry","C. comics","D. non-fiction"],
    ["A. perfect grammar","B. word count only","C. getting ideas down","D. publishing"],
    ["A. printing","B. story flow","C. cover colour","D. price"],
    ["A. sentence structure","B. paper size","C. binding","D. marketing"],
    ["A. colour","B. grammar and spelling","C. binding","D. illustration"],
    ["A. performance","B. discussion","C. publication","D. drawing"],
    ["A. money","B. instructions","C. hardware","D. cables"],

    ["A. wide","B. tall","C. small","D. flat"],
    ["A. tall","B. narrow","C. wide","D. short"],
    ["A. headings","B. body","C. captions","D. covers"],
    ["A. body text","B. margins","C. headings","D. footnotes"],
    ["A. Arial","B. Helvetica","C. Garamond","D. Verdana"],
    ["A. decorative","B. serif","C. script","D. symbol"],
    ["A. serif","B. sans-serif","C. script","D. fantasy"],
    ["A. 8 pt","B. 9 pt","C. 11–12 pt","D. 20 pt"],
    ["A. novels","B. posters","C. poetry","D. legal documents"],
    ["A. 2","B. 1","C. 0.25–0.3","D. 3"],
    ["A. decorative","B. standard","C. colourful","D. artistic"],
    ["A. copyright page","B. title page","C. index","D. glossary"],
    ["A. left","B. middle","C. right-hand","D. back"],
    ["A. dedication","B. title","C. contents","D. chapter"],
    ["A. @","B. #","C. ©","D. &"],
    ["A. International Standard Book Number","B. Internal System Book Note","C. International Script Book Name","D. Internet Standard Book Network"],
    ["A. compulsory","B. optional","C. illegal","D. printed last"],
    ["A. prices","B. chapters","C. publishers","D. printers"],
    ["A. Arabic","B. Roman","C. Greek","D. English"],
    ["A. Roman","B. Arabic","C. Latin","D. Symbol"],
    ["A. Excel","B. PowerPoint","C. Microsoft Word","D. Paint"],
    ["A. hidden pages","B. modifications","C. pictures","D. margins"],
    ["A. first","B. second","C. final","D. middle"],
    ["A. colour","B. clarity","C. size","D. shape"],
    ["A. printing","B. proofreading","C. drawing","D. scanning"],
    ["A. two","B. three","C. four","D. five"],
    ["A. printer","B. price","C. title","D. index"],
    ["A. back cover","B. spine only","C. front cover","D. copyright page only"],
    ["A. boring","B. attractive","C. heavy","D. blank"],
    ["A. compulsory","B. optional","C. illegal","D. hidden"],
    ["A. confusion","B. readability","C. noise","D. printing errors"],
    ["A. false","B. imaginary","C. credible","D. copied"],
    ["A. paper","B. cover","C. overall","D. binding"],
    ["A. strong","B. repeated","C. clear","D. important"]
];
let timeLeft = 45 * 60;   // ← changed to 45 minutes
let timerId;
let studentName = "";

function startExam() {
    studentName = document.getElementById("nameInput").value.trim();
    if (!studentName) {
        alert("Please enter your name before starting the exam.");
        return;
    }
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    document.getElementById("candidateName").textContent = "Candidate: " + studentName;
    generateQuestions();
    startTimer();
}

function generateQuestions() {
    const form = document.getElementById("quizForm");
    form.innerHTML = "";
    questions.forEach((qText, index) => {
        const qNum = index + 1;
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `<strong>${qText}</strong><div class="options"></div>`;
        const optsDiv = div.querySelector(".options");
       
        "ABCD".split("").forEach(letter => {
            const optIndex = "ABCD".indexOf(letter);
            const label = document.createElement("label");
            label.innerHTML = `<input type="radio" name="q${qNum}" value="${letter}"> ${options[index][optIndex]}`;
            optsDiv.appendChild(label);
        });
        form.appendChild(div);
    });
}

function startTimer() {
    updateTimerDisplay();
    timerId = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerId);
            alert("Time is up! Your exam is being submitted automatically.");
            submitExam(true);
        }
    }, 1000);
}

function updateTimerDisplay() {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    document.getElementById("timer").textContent =
        `Time remaining: ${min}:${sec < 10 ? "0" : ""}${sec}`;
}

function submitExam(auto = false) {
    if (timerId) clearInterval(timerId);
   
    let score = 0;
    const resultBody = document.getElementById("resultBody");
    resultBody.innerHTML = "";
    for (let i = 0; i < 60; i++) {
        const qNum = i + 1;
        const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
        const userLetter = selected ? selected.value : "-";
        const correctLetter = correctAnswers[i];
       
        const userAnswerText = userLetter === "-" ? "-" : options[i]["ABCD".indexOf(userLetter)];
        const correctAnswerText = options[i]["ABCD".indexOf(correctLetter)];
       
        const isCorrect = userLetter === correctLetter;
        if (isCorrect) score++;
        const row = document.createElement("tr");
        row.className = isCorrect ? "correct" : "wrong";
        row.innerHTML = `
            <td>${qNum}</td>
            <td>${questions[i].trim()}</td>
            <td class="answer-display">${userAnswerText}</td>
            <td class="answer-display">${correctAnswerText}</td>
            <td>${isCorrect ? "✓ Correct" : "✗ Wrong"}</td>
        `;
        resultBody.appendChild(row);
    }
    const percent = ((score / 60) * 100).toFixed(1);
    document.getElementById("summary").innerHTML = `
        <p><strong>Name:</strong> ${studentName}</p>
        <p><strong>Score:</strong> ${score} / 60 (${percent}%)</p>
        <p style="color: ${percent >= 50 ? '#27ae60' : '#c0392b'}; font-weight:bold; font-size:1.4em; margin-top:15px;">
            ${percent >= 50 ? "PASSED" : "FAILED"}
        </p>
    `;
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    if (auto) {
        document.getElementById("summary").innerHTML += "<p><em>(Auto-submitted due to time out)</em></p>";
    }
}
</script>
</body>
</html>
