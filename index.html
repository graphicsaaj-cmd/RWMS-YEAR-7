<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JSS 1 2nd Term - History Examination</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 20px;
            background: #f4f6f9;
            color: #333;
        }
        h1, h2 { text-align: center; color: #1a3c5e; }
        #intro, #quiz, #result {
            max-width: 920px; margin: 0 auto; background: white;
            padding: 25px; border-radius: 10px; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        }
        #timer {
            font-size: 1.6em; font-weight: bold; color: #d32f2f;
            text-align: center; margin: 20px 0; background: #ffebee; padding: 10px; border-radius: 8px;
        }
        .question {
            margin: 28px 0; padding: 18px; border-left: 6px solid #1976d2;
            background: #fafcff; border-radius: 8px;
        }
        .options label {
            display: block; margin: 12px 0; cursor: pointer; font-size: 1.05em;
        }
        button {
            display: block; margin: 35px auto; padding: 14px 50px; font-size: 1.25em;
            background: #388e3c; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
        button:hover { background: #2e7d32; }
        #result table {
            width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 0.98em;
        }
        #result th, #result td {
            border: 1px solid #ddd; padding: 10px; text-align: left;
        }
        #result th { background: #1a3c5e; color: white; }
        .correct { background: #e8f5e9; }
        .wrong { background: #ffebee; }
        .correct-answer-text {
            font-weight: bold;
            color: #1b5e20;
        }
        #nameInput { padding: 12px; font-size: 1.1em; width: 320px; margin: 15px; }
        .hidden { display: none; }
        #summary { font-size: 1.2em; line-height: 1.6; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
<div id="intro">
    <h1>JSS 1 – 2nd Term Examination</h1>
    <h2>History</h2>
    <p style="text-align:center; font-size:1.25em; margin:20px 0;">60 Objective Questions • 45 Minutes</p>
    <div style="text-align:center;">
        <label>Enter your full name: </label><br>
        <input type="text" id="nameInput" placeholder="Your Full Name..." required />
        <button onclick="startExam()">Start Examination</button>
    </div>
</div>

<div id="quiz" class="hidden">
    <h2 id="candidateName"></h2>
    <div id="timer">Time remaining: 45:00</div>
   
    <form id="quizForm"></form>
   
    <button type="button" onclick="submitExam()">Submit Exam</button>
</div>

<div id="result" class="hidden">
    <h2>Examination Result</h2>
    <div id="summary"></div>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Question</th>
                <th>Your Answer</th>
                <th>Correct Answer</th>
                <th>Mark</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
// Correct answers in order (1 → 60)
const correctAnswers = [
    "B","B","B","B","A","A","B","C","B","A", // 1-10
    "B","B","B","A","C","B","B","B","A","B", // 11-20
    "B","B","B","C","B","C","A","B","B","A", // 21-30
    "B","A","C","A","B","B","B","A","B","B", // 31-40
    "B","A","B","B","B","A","B","C","A","B", // 41-50
    "B","A","A","B","A","B","A","A","A","B" // 51-60
];

let timeLeft = 45 * 60; // 45 minutes in seconds
let timerId;
let studentName = "";

const questions = [
    "1. History is the study of ______",
    "2. A person who studies history is called ______",
    "3. Nigeria was amalgamated in ______",

    "11. Oral tradition is passed through ______",
    "12. Artifacts are ______ objects",
    "13. Biography is written by ______",
    "14. Autobiography is written by ______",
    "15. Internet is a ______ source",
    "16. Visiting historical sites is called ______",
    "17. Cultural objects are kept in a ______",
    "18. Books are kept in a ______",
    "19. History strengthens ______",
    "20. History helps correct past ______",
    "21. Nok culture was located in ______",
    "22. Nok people were skilled in ______",
    "23. Terracotta is made from ______",
    "24. Nok culture influenced ______",
    "25. Ile-Ife is regarded as cradle of ______ civilization",
    "26. The ruler of Ile-Ife is called ______",
    "27. Ile-Ife is famous for ______ heads",
    "28. Oduduwa is regarded as the ______ of Ile-Ife",
    "29. Ile-Ife people speak ______",
    "30. Benin is located in ______ region",
    "31. The ruler of Benin is called ______",
    "32. Benin bronzes were taken in ______",
    "33. Benin people speak ______",
    "34. The Eweka dynasty began in ______",
    "35. Western influence affects ______ culture",
    "36. History occurs within a ______",
    "37. Berlin Conference was held in ______",
    "38. Lagos became a colony in ______",
    "39. History builds critical ______",
    "40. Journals are ______ sources",
    "41. Archives preserve historical ______",
    "42. Excursions are organized for ______",
    "43. Museums display objects of ______",
    "44. Nok people were mainly ______",
    "45. Ile-Ife influenced ______ kingdom",
    "46. Benin was first ruled by ______ dynasty",
    "47. History promotes responsible ______",
    "48. Folklores are passed from generation to ______",
    "49. Students project is a ______ source",
    "50. The first son in Benin automatically ______ the throne",
    "51. History as concept refers to ______",
    "52. Storytelling may include ______",
    "53. Nigeria became a republic in ______",
    "54. The Nok culture existed during ______ Age transition",
    "55. Ile-Ife produced glass ______",
    "56. Benin is famous for bronze ______",
    "57. Oral traditions are ______ sources",
    "58. Independence Day is celebrated on ______",
    "59. Lord Lugard amalgamated Nigeria in ______",
    "60. History helps in decision ______"
];

const optionsList = [
    ["A. future events", "B. past events", "C. stories", "D. imagination"],
    ["A. writer", "B. historian", "C. teacher", "D. speaker"],
    ["A. 1900", "B. 1914", "C. 1960", "D. 1861"],
    ["A. 1959", "B. 1960", "C. 1963", "D. 1914"],
    ["A. 1963", "B. 1960", "C. 1914", "D. 1851"],
    ["A. 1000BC", "B. 1500AD", "C. 1914", "D. 1960"],
    ["A. guessing", "B. research", "C. imagination", "D. myths"],
    ["A. research", "B. facts", "C. imagination", "D. archives"],
    ["A. conflict", "B. leadership", "C. division", "D. fear"],
    ["A. original", "B. copied", "C. imaginary", "D. false"],
    ["A. writing", "B. speech", "C. drawing", "D. printing"],
    ["A. natural", "B. man-made", "C. foreign", "D. modern"],
    ["A. the person", "B. another person", "C. a teacher", "D. a student"],
    ["A. self", "B. historian", "C. friend", "D. editor"],
    ["A. primary", "B. secondary", "C. tertiary", "D. oral"],

    ["A. library", "B. museum", "C. court", "D. market"],
    ["A. palace", "B. library", "C. shrine", "D. museum"],

    ["A. gold mining", "B. iron smelting", "C. oil drilling", "D. fishing"],
    ["A. iron", "B. clay", "C. gold", "D. wood"],
    ["A. America", "B. Europe", "C. Ife and Benin", "D. Asia"],
    ["A. Hausa", "B. Yoruba", "C. Igbo", "D. Tiv"],
    ["A. Emir", "B. Obi", "C. Ooni", "D. Oba"],
    ["A. bronze", "B. plastic", "C. silver", "D. diamond"],
    ["A. hunter", "B. founder", "C. trader", "D. explorer"],
    ["A. Edo", "B. Yoruba", "C. Hausa", "D. Igbo"],
    ["A. South-South", "B. North", "C. East", "D. West"],
    ["A. Ooni", "B. Oba", "C. Emir", "D. Obi"],
    ["A. 1897", "B. 1960", "C. 1914", "D. 1861"],
    ["A. Igbo", "B. Yoruba", "C. Edo", "D. Hausa"],
    ["A. 1180AD", "B. 1914", "C. 1960", "D. 1851"],
    ["A. Nok", "B. Benin", "C. Asian", "D. European"],
    ["A. culture", "B. time frame", "C. story", "D. myth"],
    ["A. France", "B. Germany", "C. Nigeria", "D. Spain"],
    ["A. 1861", "B. 1914", "C. 1960", "D. 1897"],
    ["A. dancing", "B. thinking", "C. running", "D. trading"],
    ["A. primary", "B. secondary", "C. oral", "D. legend"],
    ["A. toys", "B. evidence", "C. clothes", "D. food"],
    ["A. groups", "B. animals", "C. markets", "D. traders"],
    ["A. sports", "B. culture", "C. music", "D. farming"],
    ["A. bankers", "B. farmers", "C. drivers", "D. traders"],
    ["A. Sokoto", "B. Benin", "C. Kano", "D. Daura"],

    ["A. rejects", "B. ascends", "C. leaves", "D. ignores"],
    ["A. research", "B. total past events", "C. storytelling", "D. writing"],
    ["A. myths", "B. archives", "C. research", "D. documents"],
    ["A. 1963", "B. 1960", "C. 1914", "D. 1851"],
    ["A. Bronze", "B. Stone to Iron", "C. Steel", "D. Modern"],
    ["A. beads", "B. cars", "C. metals", "D. crowns"],
    ["A. farming", "B. casting", "C. dancing", "D. driving"],
    ["A. primary", "B. tertiary", "C. modern", "D. foreign"],
    ["A. October 1", "B. January 1", "C. May 29", "D. July 4"],
    ["A. 1914", "B. 1960", "C. 1861", "D. 1897"],
    ["A. playing", "B. making", "C. running", "D. shouting"]
];

function getOptionText(questionIndex, letter) {
    const idx = "ABCD".indexOf(letter);
    if (idx === -1) return letter;
    const text = optionsList[questionIndex][idx];
    return `${letter}. ${text.substring(3).trim()}`;
}

function startExam() {
    studentName = document.getElementById("nameInput").value.trim();
    if (!studentName) {
        alert("Please enter your full name to start the exam.");
        return;
    }
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    document.getElementById("candidateName").textContent = "Candidate: " + studentName;
    generateQuestions();
    startTimer();
}

function generateQuestions() {
    const form = document.getElementById("quizForm");
    form.innerHTML = "";
    questions.forEach((qText, i) => {
        const qNum = i + 1;
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `<strong>${qText}</strong><div class="options"></div>`;
        const optsDiv = div.querySelector(".options");
        "ABCD".split("").forEach((letter, idx) => {
            const label = document.createElement("label");
            label.innerHTML = `
                <input type="radio" name="q${qNum}" value="${letter}" required>
                ${optionsList[i][idx]}
            `;
            optsDiv.appendChild(label);
        });
        form.appendChild(div);
    });
}

function startTimer() {
    updateTimer();
    timerId = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
            clearInterval(timerId);
            alert("Time has expired! Your exam is being submitted automatically.");
            submitExam(true);
        }
    }, 1000);
}

function updateTimer() {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    document.getElementById("timer").textContent =
        `Time remaining: ${min}:${sec < 10 ? "0" : ""}${sec}`;
}

function submitExam(auto = false) {
    if (timerId) clearInterval(timerId);

    let score = 0;
    const tbody = document.getElementById("resultBody");
    tbody.innerHTML = "";

    for (let i = 0; i < 60; i++) {
        const qNum = i + 1;
        const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
        const userAns = selected ? selected.value : "—";
        const correct = correctAnswers[i];
        const isCorrect = userAns === correct;

        if (isCorrect) score++;

        const userDisplay = userAns === "—" ? "—" : getOptionText(i, userAns);
        const correctDisplay = getOptionText(i, correct);

        const row = document.createElement("tr");
        row.className = isCorrect ? "correct" : "wrong";
        row.innerHTML = `
            <td>${qNum}</td>
            <td>${questions[i].substring(0, 70)}${questions[i].length > 70 ? "..." : ""}</td>
            <td>${userDisplay}</td>
            <td class="correct-answer-text">${correctDisplay}</td>
            <td>${isCorrect ? "✓ Correct" : "✗ Wrong"}</td>
        `;
        tbody.appendChild(row);
    }

    const percent = ((score / 60) * 100).toFixed(1);
    const status = percent >= 50 ? "PASSED" : "FAILED";
    const color = percent >= 50 ? "#2e7d32" : "#d32f2f";

    document.getElementById("summary").innerHTML = `
        <p><strong>Name:</strong> ${studentName}</p>
        <p><strong>Score:</strong> ${score} / 60 (${percent}%)</p>
        <p style="color:${color}; font-weight:bold; font-size:1.4em;">
            ${status}
        </p>
        ${auto ? '<p><em>(Submitted automatically – time expired)</em></p>' : ''}
    `;

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
}
</script>
</body>
</html>
