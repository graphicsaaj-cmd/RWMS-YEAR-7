// ------------------ Logic ------------------

let timeLeft = 45 * 60;
let timerId;
let userName = "";

const startScreen = document.getElementById("start-screen");
const quizDiv     = document.getElementById("quiz");
const resultDiv   = document.getElementById("result");
const timerEl     = document.getElementById("timer");
const nameDisplay = document.getElementById("candidateName");
const quizForm    = document.getElementById("quizForm");
const resultText  = document.getElementById("resultText");
const detailed    = document.getElementById("detailedAnswers");

document.getElementById("startBtn").onclick = () => {
    userName = document.getElementById("nameInput").value.trim();
    if (!userName) {
        alert("Please enter your name!");
        return;
    }
    nameDisplay.textContent = `Candidate: ${userName}`;
    startScreen.classList.add("hidden");
    quizDiv.classList.remove("hidden");
    generateQuestions();
    startTimer();
};

function startTimer() {
    updateTimerDisplay();
    timerId = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerId);
            alert("Time's up! Submitting your exam...");
            submitExam();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent = `Time remaining: ${min}:${sec < 10 ? "0" : ""}${sec}`;
}

function generateQuestions() {
    let html = "";
    questions.forEach((qText, i) => {
        const qNum = i + 1;
        html += `<div class="question">
            <p><strong>${qText}</strong></p>
            <div class="options">`;
        
        const opts = options[i];
        opts.forEach((opt, j) => {
            const letter = String.fromCharCode(97 + j); // a,b,c,...
            html += `
                <label>
                    <input type="radio" name="q${qNum}" value="${letter}">
                    ${opt}
                </label>`;
        });
        html += `</div></div>`;
    });
    quizForm.innerHTML = html;
}

document.getElementById("submitBtn").onclick = submitExam;

function submitExam() {
    clearInterval(timerId);
    quizDiv.classList.add("hidden");
    resultDiv.classList.remove("hidden");

    let score = 0;
    let detailHtml = "<h3>Detailed Answers:</h3>";

    questions.forEach((_, i) => {
        const qNum = i + 1;
        const selected = document.querySelector(`input[name="q${qNum}"]:checked`);
        const userAns = selected ? selected.value : null;
        const correct = correctAnswers.find(c => c.q === qNum);
        const correctLetter = correct.ans;
        const correctText = correct.text;

        const isCorrect = userAns === correctLetter;
        if (isCorrect) score++;

        detailHtml += `
            <div style="margin:20px 0;">
                <strong>Question ${qNum}:</strong><br>
                Your answer: ${userAns ? userAns.toUpperCase() : "(not answered)"} 
                <span class="${isCorrect ? 'correct' : 'your-answer-was wrong'}">
                    ${isCorrect ? "✔ Correct" : "✘ Wrong"}
                </span><br>
                <span class="correct">Correct answer: ${correctLetter.toUpperCase()} (${correctText})</span>
            </div>`;
    });

    resultText.innerHTML = `
        <strong>${userName}</strong>, you scored <span style="font-size:1.6em;color:#2e7d32;">${score}</span> / ${questions.length}<br>
        (${((score / questions.length) * 100).toFixed(1)}%)
    `;
    detailed.innerHTML = detailHtml;
}
